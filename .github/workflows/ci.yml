name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Type check and build
        run: pnpm build
        env:
          POSTGRES_URL: postgresql://fake:fake@localhost:5432/fake
          AUTH_SECRET: ci-test-secret-that-is-at-least-32-chars-long

      - name: Run tests
        run: pnpm test
